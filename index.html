<style>
  :root{
    --accent:#1e3a8a; --accent-tint:rgba(30,58,138,0.08); --accent-soft:rgba(30,58,138,0.15);
    --zinc-50:#fafafa; --zinc-100:#f4f4f5; --zinc-200:#e4e4e7; --zinc-300:#d4d4d8;
    --zinc-400:#a1a1aa; --zinc-500:#71717a; --zinc-600:#52525b; --zinc-700:#3f3f46;
    --zinc-900:#18181b; --amber:#d97706; --amber-bg:#fef3c7; --emerald:#059669; --emerald-bg:#d1fae5;
    --rose:#e11d48; --rose-bg:#ffe4e6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--zinc-50); color:var(--zinc-900); -webkit-tap-highlight-color:transparent;
  }
  button{font-family:inherit; cursor:pointer;}
  input,textarea,select{font-family:inherit; font-size:14px;}
  .container{max-width:1100px; margin:0 auto; padding:0 16px;}
  header.topbar{
    position:sticky; top:0; z-index:40; background:rgba(255,255,255,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--zinc-200);
    padding-top:env(safe-area-inset-top);
  }
  .topbar-inner{display:flex; align-items:center; justify-content:space-between; gap:12px; height:56px;}
  .brand{display:flex; align-items:center; gap:8px; font-weight:600;}
  .brand-icon{width:30px; height:30px; border-radius:8px; background:var(--zinc-900); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px;}
  .brand .muted{color:var(--zinc-500); font-weight:400;}
  nav.tabs{display:flex; gap:4px;}
  .tab-btn{border:none; background:none; padding:7px 12px; border-radius:7px; font-size:13px; font-weight:500; color:var(--zinc-600);}
  .tab-btn.active{background:var(--zinc-100); color:var(--zinc-900);}
  .btn{
    border:1px solid transparent; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600;
    display:inline-flex; align-items:center; gap:6px; background:var(--zinc-900); color:#fff; white-space:nowrap;
  }
  .btn:active{opacity:0.85;}
  .btn.outline{background:#fff; color:var(--zinc-900); border-color:var(--zinc-300);}
  .btn.ghost{background:transparent; color:var(--zinc-600); padding:7px 9px;}
  .btn.sm{padding:6px 10px; font-size:12px;}
  .btn.danger{color:var(--rose);}
  .btn.icon{padding:7px; width:34px; height:34px; justify-content:center;}
  .btn.accent{background:var(--accent);}
  main{padding:24px 0 80px;}
  .page-head{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px;}
  .page-head h1{font-size:24px; margin:0; letter-spacing:-0.01em;}
  .page-head p{margin:4px 0 0; color:var(--zinc-500); font-size:13px;}
  .card{background:#fff; border:1px solid var(--zinc-200); border-radius:12px;}
  .pad{padding:18px;}
  .kpi-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px;}
  @media(min-width:700px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:980px){.kpi-grid{grid-template-columns:repeat(6,1fr);}}

<script>
/* ======================= UTILITIES ======================= */
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

function escapeHtml(s){
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function hexToRgb(hex){
  const c = (hex || "#1e3a8a").replace("#","");
  return { r: parseInt(c.slice(0,2),16)||0, g: parseInt(c.slice(2,4),16)||0, b: parseInt(c.slice(4,6),16)||0 };
}
function tintColor(hex, alpha){ const {r,g,b} = hexToRgb(hex); return `rgba(${r},${g},${b},${alpha})`; }

function formatCurrency(amount, symbol){
  symbol = symbol || "$";
  const value = Number(amount || 0);
  const formatted = value.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return symbol.length > 1 ? `${symbol} ${formatted}` : `${symbol}${formatted}`;
}
function formatDate(d){
  if (!d) return "";
  const dt = typeof d === "string" ? new Date(d) : d;
  if (isNaN(dt.getTime())) return "";
  return dt.toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" });
}
function computeTotals(items, discountRate, taxRate, shipping){
  const safe = Array.isArray(items) ? items : [];
  const lineTotals = safe.map(it => {
    const gross = (Number(it.quantity)||0) * (Number(it.unitPrice)||0);
    const lineDiscount = gross * ((Number(it.discount)||0)/100);
    return { ...it, gross, lineDiscount, net: gross - lineDiscount };
  });
  const subtotal = lineTotals.reduce((s,it)=>s+it.gross,0);
  const itemDiscountTotal = lineTotals.reduce((s,it)=>s+it.lineDiscount,0);
  const afterItemDiscount = subtotal - itemDiscountTotal;
  const globalDiscount = afterItemDiscount * ((Number(discountRate)||0)/100);
  const afterDiscount = afterItemDiscount - globalDiscount;
  const taxAmount = afterDiscount * ((Number(taxRate)||0)/100);
  const total = afterDiscount + taxAmount + (Number(shipping)||0);
  return { lineTotals, subtotal, itemDiscountTotal, discountAmount: globalDiscount, afterDiscount, taxAmount, shipping: Number(shipping)||0, total };
}
function generateQuotationNumber(){
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth()+1).padStart(2,"0");
  const seq = String(DATA.quotations.length + 1).padStart(4,"0");

}

let WARNED_NO_STORAGE = false;

async function loadData(){
  if (!HAS_STORAGE){ DATA = defaultData(); return; }
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if (res && res.value){
      DATA = JSON.parse(res.value);
      if (!Array.isArray(DATA.customers)) DATA.customers = [];
      if (!Array.isArray(DATA.quotations)) DATA.quotations = [];
      if (!DATA.company) DATA.company = defaultData().company;
      return;
    }
  } catch(e){ /* key not found yet, fall through to defaults */ }
  DATA = defaultData();
}

async function persist(){
  if (!HAS_STORAGE){
    if (!WARNED_NO_STORAGE){
      WARNED_NO_STORAGE = true;
      showToast("Saved for this session only (storage unavailable here)", true);
    }
    return;
  }
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(DATA), false);
  }catch(e){
    console.error("storage save failed", e);
    showToast("Couldn't save — storage error", true);
  }
}

/* ======================= RENDER ROOT ======================= */
/* Preserve focus + cursor position across a full re-render, so typing in
   any field doesn't lose focus after every keystroke (the DOM node for the
   focused input gets destroyed and recreated on every render call). */
function withFocus(fn){
  const active = document.activeElement;
  let key = null, selStart = null, selEnd = null;
  if (active && active.dataset && active.dataset.key){
    key = active.dataset.key;
    if (typeof active.selectionStart === "number"){
      try{ selStart = active.selectionStart; selEnd = active.selectionEnd; }catch(e){}
    }
  }
  fn();
  if (key){
    const el = document.querySelector(`[data-key="${key}"]`);
    if (el){
      el.focus({ preventScroll:true });
      if (selStart !== null && typeof el.setSelectionRange === "function"){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

function doRender(){
  applyAccent();
  const root = document.getElementById("root");
  let body = "";
  if (VIEW.name === "dashboard") body = renderDashboard();
  else if (VIEW.name === "list") body = renderList();
  else if (VIEW.name === "form") body = renderForm();
  else if (VIEW.name === "preview") body = renderPreview();

  root.innerHTML = `
    <header class="topbar no-print">
      <div class="container topbar-inner">
        <div class="brand">
          <div class="brand-icon">QF</div>
          <div>Quot<span class="muted">'n</span>Flow</div>

        </nav>
        <button class="btn sm" onclick="openNewQuotation()">+ New</button>
      </div>
    </header>
    <main class="container">${body}</main>
  `;

  if (SETTINGS_OPEN) doRenderSettingsModal();
  if (CUSTOMER_MODAL_OPEN) doRenderCustomerModal();
}
function render(){ withFocus(doRender); }

/* ======================= DASHBOARD ======================= */
function renderDashboard(){
  const qs = DATA.quotations;
  const symbol = DATA.company.currencySymbol || "$";
  const total = qs.length;
  const draft = qs.filter(q=>q.status==="draft").length;
  const sent = qs.filter(q=>q.status==="sent").length;
  const accepted = qs.filter(q=>q.status==="accepted").length;
  const rejected = qs.filter(q=>q.status==="rejected").length;
  const pipelineValue = qs.filter(q=>q.status==="draft"||q.status==="sent").reduce((s,q)=>s+(q.total||0),0);
  const wonValue = qs.filter(q=>q.status==="accepted").reduce((s,q)=>s+(q.total||0),0);

  // last 6 months
  const months = [];
  const now = new Date();
  for (let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({ y:d.getFullYear(), m:d.getMonth(), label:d.toLocaleDateString("en-US",{month:"short"}), value:0, count:0 });
  }
  qs.forEach(q=>{
    const d = new Date(q.quotationDate);
    if (isNaN(d.getTime())) return;
    const slot = months.find(mo => mo.y===d.getFullYear() && mo.m===d.getMonth());
    if (slot){ slot.value += (q.total||0); slot.count += 1; }
  });
  const maxVal = Math.max(...months.map(m=>m.value), 1);

  const recent = [...qs].sort((a,b)=> (b.createdAt||0)-(a.createdAt||0)).slice(0,5);

  const statusRows = [
    {key:"draft", label:"Draft", color:"#a1a1aa", val:draft},
    {key:"sent", label:"Sent", color:"#d97706", val:sent},
    {key:"accepted", label:"Accepted", color:"#059669", val:accepted},
    {key:"rejected", label:"Rejected", color:"#e11d48", val:rejected},
  ];

  return `
    <div class="page-head">
      <div>
        <h1>Dashboard</h1>
        <p>Track your quotations, customers and revenue pipeline.</p>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn outline sm" onclick="openSettings()">⚙ Company Settings</button>
        <button class="btn sm" onclick="openNewQuotation()">+ New Quotation</button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="ico">📄</div><div class="val">${total}</div><div class="lbl">Total Quotations</div></div>
      <div class="kpi"><div class="ico">📝</div><div class="val">${draft}</div><div class="lbl">Draft</div></div>
      <div class="kpi"><div class="ico">📤</div><div class="val">${sent}</div><div class="lbl">Sent</div></div>
      <div class="kpi"><div class="ico">✅</div><div class="val">${accepted}</div><div class="lbl">Accepted</div></div>
      <div class="kpi"><div class="ico">💰</div><div class="val">${formatCurrency(pipelineValue,symbol)}</div><div class="lbl">Pipeline Value</div></div>
      <div class="kpi"><div class="ico">📈</div><div class="val">${formatCurrency(wonValue,symbol)}</div><div class="lbl">Won Value</div></div>
    </div>

    <div class="grid2col">
      <div class="card pad">
        <h3 style="margin:0 0 2px; font-size:14px;">Quotation Volume — Last 6 Months</h3>
        <p class="x-small" style="margin:0 0 6px;">Total value of quotations created each month</p>
        <div class="chart-bars">
          ${months.map(m => `
            <div class="bar-col">
              <div class="bar-track"><div class="bar" style="height:${Math.max((m.value/maxVal)*100,2)}%" title="${formatCurrency(m.value,symbol)}"></div></div>
              <div class="bar-lbl">${m.label}</div>
              <div class="bar-cnt">${m.count} qt</div>
            </div>`).join("")}
        </div>
      </div>
      <div class="card pad">
        <h3 style="margin:0 0 2px; font-size:14px;">Status Breakdown</h3>
        <p class="x-small" style="margin:0 0 10px;">Where your quotations stand</p>
        ${statusRows.map(s=>{
          const pct = total>0 ? Math.round((s.val/total)*100) : 0;
          return `<div class="status-row">
            <div class="top"><span class="muted">${s.label}</span><span>${s.val} <span class="muted x-small">(${pct}%)</span></span></div>
            <div class="status-track"><div class="status-fill" style="width:${pct}%; background:${s.color}"></div></div>
          </div>`;
        }).join("")}
      </div>
    </div>

    <div class="card pad">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div>
          <h3 style="margin:0; font-size:14px;">Recent Quotations</h3>
          <p class="x-small" style="margin:2px 0 0;">Last 5 created quotations</p>
        </div>
        <button class="btn ghost sm" onclick="openNewQuotation()">+ New</button>
      </div>
      ${recent.length===0 ? `
        <div class="empty">
          <div style="font-size:32px; margin-bottom:8px;">📄</div>
          <p>No quotations yet. Create your first one.</p>
          <button class="btn" onclick="openNewQuotation()">+ Create Quotation</button>
        </div>` : `
        <div class="scrollx"><table class="list">
          <thead><tr><th>Quotation #</th><th>Customer</th><th>Date</th><th>Status</th><th style="text-align:right">Total</th><th></th></tr></thead>
          <tbody>
            ${recent.map(q => renderListRow(q)).join("")}
          </tbody>
        </table></div>`}
    </div>
  `;
}

function renderListRow(q){
  const cust = DATA.customers.find(c=>c.id===q.customerId);
  const symbol = DATA.company.currencySymbol || "$";
  return `
    <tr>
      <td style="font-family:ui-monospace,monospace; font-size:12px;">${escapeHtml(q.quotationNumber)}</td>
      <td>
        <div style="font-weight:500;">${escapeHtml(cust?.name || "—")}</div>
        <div class="x-small">${escapeHtml(cust?.company || "")}</div>
      </td>
      <td class="x-small" style="color:var(--zinc-500)">${formatDate(q.quotationDate)}</td>
      <td><span class="badge ${q.status}">${STATUS_LABEL[q.status]}</span></td>
      <td style="text-align:right; font-weight:600;">${formatCurrency(q.total, symbol)}</td>
      <td>
        <div class="row-actions">
          <button class="btn ghost icon" title="Preview" onclick="openPreview('${q.id}')">👁</button>
          <button class="btn ghost icon" title="Edit" onclick="openEditQuotation('${q.id}')">✎</button>
          <button class="btn ghost icon danger" title="Delete" onclick="deleteQuotation('${q.id}')">🗑</button>
        </div>
      </td>
    </tr>
  `;
}

function filteredQuotations(){
  let qs = [...DATA.quotations].sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));
  if (LIST_STATUS !== "all") qs = qs.filter(q=>q.status===LIST_STATUS);
  if (LIST_SEARCH.trim()){
    const s = LIST_SEARCH.toLowerCase();
    qs = qs.filter(q=>{
      const cust = DATA.customers.find(c=>c.id===q.customerId);
      return (q.quotationNumber||"").toLowerCase().includes(s) ||
             (cust?.name||"").toLowerCase().includes(s) ||
             (cust?.company||"").toLowerCase().includes(s) ||
             (q.subject||"").toLowerCase().includes(s);
    });
  }
  return qs;
}
function listResultsHtml(){
  const qs = filteredQuotations();
  return qs.length===0 ? `
        <div class="empty">
          <div style="font-size:32px; margin-bottom:8px;">📄</div>
          <p>No quotations match.</p>
        </div>` : `
        <div class="scrollx"><table class="list">
          <thead><tr><th>Quotation #</th><th>Customer</th><th>Date</th><th>Status</th><th style="text-align:right">Total</th><th></th></tr></thead>
          <tbody>${qs.map(q=>renderListRow(q)).join("")}</tbody>
        </table></div>`;
}
function filterListResults(value){
  LIST_SEARCH = value;
  const el = document.getElementById("list-results");
  if (el) el.innerHTML = listResultsHtml();
}
function filterListStatus(value){
  LIST_STATUS = value;
  const el = document.getElementById("list-results");
  if (el) el.innerHTML = listResultsHtml();
}
function renderList(){
  return `
    <div class="page-head">
      <div><h1>Quotations</h1><p>All your quotations in one place.</p></div>
      <button class="btn sm" onclick="openNewQuotation()">+ New Quotation</button>

        <option value="accepted" ${LIST_STATUS==='accepted'?'selected':''}>Accepted</option>

function deleteQuotation(id){
  const q = DATA.quotations.find(x=>x.id===id);
  if (!q) return;
  if (!confirm(`Delete quotation ${q.quotationNumber}? This cannot be undone.`)) return;
  DATA.quotations = DATA.quotations.filter(x=>x.id!==id);
  persist();
  showToast("Quotation deleted");
  render();
}

  FORM = {
    id: null,
    customerId: null,
    quotationDate: new Date().toISOString().slice(0,10),
    validUntil: "",
    subject: "",
    items: [emptyItem()],
    discountRate: 0,
    taxRate: DATA.company.taxRate || 0,
    shipping: 0,
    notes: "",
    terms: DATA.company.paymentTerms || "",
    status: "draft"
  };
  navigate({ name:"form" });
}
function openEditQuotation(id){
  const q = DATA.quotations.find(x=>x.id===id);
  if (!q) return;
  FORM = JSON.parse(JSON.stringify(q));
  navigate({ name:"form" });
}

// Plain text/date fields never need a re-render — the input already shows
// what was typed natively. Only fields that feed the live totals/amount
// display get a surgical DOM patch (no innerHTML rebuild, no focus loss).
const TOTALS_AFFECTING_FORM_FIELDS = new Set(["discountRate","taxRate","shipping"]);
function updateFormField(field, value){
  FORM[field] = value;
  if (TOTALS_AFFECTING_FORM_FIELDS.has(field)) recalcFormTotals();
}
function updateItemField(itemId, field, value){
  const it = FORM.items.find(i=>i.id===itemId);
  if (!it) return;
  it[field] = (field==="quantity"||field==="unitPrice"||field==="discount") ? Number(value) : value;
  if (field==="quantity"||field==="unitPrice"||field==="discount") recalcFormTotals();
}
function setText(id, text){ const el = document.getElementById(id); if (el) el.textContent = text; }
function recalcFormTotals(){
  if (!FORM) return;
  const symbol = DATA.company.currencySymbol || "$";
  const totals = computeTotals(FORM.items, FORM.discountRate, FORM.taxRate, FORM.shipping);
  totals.lineTotals.forEach(it=>{ setText("amt-"+it.id, formatCurrency(it.net, symbol)); });
  setText("t-subtotal", formatCurrency(totals.subtotal, symbol));
  setText("t-itemdisc", "−" + formatCurrency(totals.itemDiscountTotal, symbol));
  setText("t-discamt", "−" + formatCurrency(totals.discountAmount, symbol));
  setText("t-taxamt", formatCurrency(totals.taxAmount, symbol));
  setText("t-total", formatCurrency(totals.total, symbol));
}
function addFormItem(){ FORM.items.push(emptyItem()); render(); }
function removeFormItem(itemId){
  if (FORM.items.length===1) return;
  FORM.items = FORM.items.filter(i=>i.id!==itemId);
  render();
}

function saveQuotation(statusOverride, previewAfter){
  if (!FORM.customerId){ showToast("Please select a customer", true); return; }
  if (FORM.items.length===0 || FORM.items.every(i=>!i.description.trim())){ showToast("Add at least one line item", true); return; }
  const totals = computeTotals(FORM.items, FORM.discountRate, FORM.taxRate, FORM.shipping);
  const now = Date.now();
  let saved;
  if (FORM.id){
    const idx = DATA.quotations.findIndex(q=>q.id===FORM.id);
    saved = {
      ...DATA.quotations[idx], ...FORM,
      status: statusOverride || FORM.status,
      subtotal: totals.subtotal, discountAmount: totals.discountAmount, taxAmount: totals.taxAmount, total: totals.total,
      updatedAt: now
    };
    DATA.quotations[idx] = saved;
  } else {
    saved = {
      ...FORM, id: uid(), quotationNumber: generateQuotationNumber(),
      status: statusOverride || FORM.status,
      subtotal: totals.subtotal, discountAmount: totals.discountAmount, taxAmount: totals.taxAmount, total: totals.total,
      createdAt: now, updatedAt: now
    };
    DATA.quotations.push(saved);
  }
  persist();
  showToast(FORM.id ? "Quotation updated" : `Quotation created — ${saved.quotationNumber}`);
  if (previewAfter){ navigate({ name:"preview", id: saved.id }); }
  else { navigate({ name:"list" }); }
}

// THE FIX: wait for fonts + every image in #print-area to actually finish
// loading/decoding (and let two paint cycles settle) before invoking print.
// This avoids the Safari/iOS bug where an early, unstyled paint gets
// captured as an extra leading page in the exported PDF.
async function handlePrint(){
  const statusEl = document.getElementById("print-status");
  const setStatus = (m)=>{ if (statusEl) statusEl.textContent = m; };
  setStatus("Preparing print — waiting for fonts + images…");
  try{
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
    const area = document.getElementById("print-area");
    const imgs = area ? Array.from(area.querySelectorAll("img")) : [];
    await Promise.all(imgs.map(img => {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise(resolve => {
        img.addEventListener("load", ()=>resolve(), { once:true });
        img.addEventListener("error", ()=>resolve(), { once:true });
      });
    }));
    await new Promise(resolve => requestAnimationFrame(()=>requestAnimationFrame(()=>resolve())));
  } catch(e){
    setStatus("Wait step failed, printing anyway.");
  }
  setStatus("Ready — opening print dialog now.");
  window.print();
}

    const picker = document.querySelector('[data-key="s-accent-picker"]');
    const text = document.querySelector('[data-key="s-accent-text"]');
    if (picker && picker.value !== value) picker.value = value;

      sw.classList.toggle("sel", sw.dataset.color === value);

  // All other fields: state is updated above; the input already shows what
  // was typed natively, so no re-render is needed (and none should happen,

  reader.onload = () => { SETTINGS_FORM[field] = reader.result; renderSettingsModal(); };
  reader.readAsDataURL(file);
}

          <div class="fld-wrap"><label class="fld">Account Number</label><input type="text" value="${escapeHtml(f.bankAccount)}" data-key="s-bankacct" oninput="setSettingsField('bankAccount',this.value)" /></div>
        </div>
        <div class="fld-wrap"><label class="fld">IFSC / SWIFT</label><input type="text" value="${escapeHtml(f.bankIfsc)}" data-key="s-bankifsc" oninput="setSettingsField('bankIfsc',this.value)" /></div>
      </div>

      <div class="sec">
        <label class="fld">Default Payment Terms</label>
        <textarea rows="3" data-key="s-terms" oninput="setSettingsField('paymentTerms',this.value)">${escapeHtml(f.paymentTerms)}</textarea>
      </div>

      <div class="sec">
        <h4 style="margin:0 0 8px; font-size:13px;">Backup</h4>
        <div style="display:flex; gap:8px;">
          <button class="btn outline sm" onclick="exportBackup()">⬇ Export Backup (JSON)</button>
          <label class="btn outline sm" style="cursor:pointer;">⬆ Import Backup
            <input type="file" accept="application/json" style="display:none" onchange="importBackup(this)" />
          </label>
        </div>
        <p class="x-small" style="margin-top:6px;">Your data lives in this browser's storage for this app. Export a backup occasionally so you never lose it.</p>
      </div>

      <div class="modal-foot">
        <button class="btn outline sm" onclick="closeSettings()">Cancel</button>
        <button class="btn sm" onclick="saveSettings()">💾 Save Settings</button>
      </div>
    </div>
  `;
  root.appendChild(overlay);
}

/* ======================= BACKUP ======================= */
function exportBackup(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `quotnflow-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function importBackup(inputEl){
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if (!parsed.company || !Array.isArray(parsed.quotations)) throw new Error("bad format");
      DATA = parsed;
      if (!Array.isArray(DATA.customers)) DATA.customers = [];
      persist();
      showToast("Backup restored");
      SETTINGS_OPEN = false;
      navigate({ name:"dashboard" });
    }catch(e){
      showToast("Invalid backup file", true);
    }
  };
  reader.readAsText(file);
}

/* ======================= BOOT ======================= */
(async function boot(){
  document.getElementById("root").innerHTML = `<div style="padding:60px; text-align:center; color:var(--zinc-500);">Loading…</div>`;
  await loadData();
  render();
})();
</script>
</body>
</html>
